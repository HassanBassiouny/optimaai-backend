version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────
  postgres:
    image: postgres:16
    container_name: optimaai_postgres
    restart: always
    environment:
      POSTGRES_USER:     optimaai
      POSTGRES_PASSWORD: optimaai123
      POSTGRES_DB:       optimaai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Redis Cache ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: optimaai_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
